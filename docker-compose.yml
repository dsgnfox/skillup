services:
  db:
    image: postgres:18.3-alpine3.23
    container_name: skillup_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: skillup_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d skillup_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: